name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync dependencies (including dev group)
        run: uv sync --all-extras --group dev

      - name: mypy --strict
        run: uv run mypy --strict src/lattice

      - name: pytest
        run: uv run pytest -v

      - name: Check formatting
        run: uv run black --check src/lattice tests
